<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoDesign | Landing Page Acessível</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

    <header role="banner">
        <nav class="navbar" aria-label="Menu Principal">
            <div class="logo" aria-hidden="true">🌿 EcoDesign</div>
            <div class="a11y-controls" role="group" aria-label="Ferramentas de Acessibilidade">
                <button id="toggle-contrast" title="Alternar Alto Contraste" aria-label="Alternar Alto Contraste">🌓</button>
                <button id="font-up" title="Aumentar Fonte" aria-label="Aumentar Fonte">A+</button>
                <button id="font-down" title="Diminuir Fonte" aria-label="Diminuir Fonte">A-</button>
            </div>
        </nav>
    </header>

    <main id="main-content" tabindex="-1">
        <section class="hero" aria-labelledby="hero-title">
            <h1 id="hero-title">Design que respeita o futuro.</h1>
            <p>Criamos soluções digitais focadas em baixo impacto ambiental e alta acessibilidade para todos os usuários.</p>
        </section>

        <section class="services" id="services" aria-labelledby="services-title">
            <h2 id="services-title">Nossos Serviços</h2>
            <div class="grid-container" id="services-grid">
                </div>
        </section>

        <section class="portfolio" aria-labelledby="portfolio-title">
            <h2 id="portfolio-title">Projetos em Destaque</h2>
            <div class="carousel" role="region" aria-roledescription="carousel" aria-label="Galeria de Projetos">
                <div class="carousel-track-container">
                    <ul class="carousel-track" id="carousel-track">
                        </ul>
                </div>
                <div class="carousel-nav">
                    <button class="carousel-btn prev" aria-label="Slide anterior">❮</button>
                    <button class="carousel-btn next" aria-label="Próximo slide">❯</button>
                </div>
            </div>
        </section>

        <section class="faq" aria-labelledby="faq-title">
            <h2 id="faq-title">Dúvidas Frequentes</h2>
            <div id="faq-container" class="faq-list">
                </div>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2026 EcoDesign. Desenvolvido com foco em inclusão digital.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
